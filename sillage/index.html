  function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

})();

/* ─── SPRITE CANVAS (unchanged) ─── */
function SpriteCanvas(){
  const containerRef=useRef(null);
  const sRef=useRef({linkX:100,linkFacing:1,linkFrame:0,fairyFrame:0,fairyT:0,fairyX:0,fairyY:0,linkTop:0,mist:[],sparks:[],width:800,height:600});
  const rafRef=useRef(null),lastTRef=useRef(0),linkTickRef=useRef(0),fairyTickRef=useRef(0),dirRef=useRef(1);
  const [,tick]=useState(0);
  useEffect(()=>{
    const loop=(ts)=>{
      const dt=ts-lastTRef.current;lastTRef.current=ts;
      const s=sRef.current;
      if(containerRef.current){s.width=containerRef.current.offsetWidth;s.height=containerRef.current.offsetHeight;}
      const lScale=2.25,lH=30*lScale;s.linkTop=s.height-lH-10;
      linkTickRef.current+=dt;
      if(linkTickRef.current>140){linkTickRef.current=0;s.linkX+=dirRef.current*4;if(s.linkX>s.width-80){dirRef.current=-1;s.linkFacing=-1;}if(s.linkX<20){dirRef.current=1;s.linkFacing=1;}s.linkFrame=(s.linkFrame+1)%2;}
      fairyTickRef.current+=dt;
      if(fairyTickRef.current>45){fairyTickRef.current=0;s.fairyT+=0.12;s.fairyFrame=(s.fairyFrame+1)%2;const to=s.linkFacing===1?-30:30;const ox=s.linkX+10+to+Math.sin(s.fairyT*1.1)*8;const oy=s.linkTop+8+Math.sin(s.fairyT*2.4)*10;s.fairyX=ox;s.fairyY=oy;for(let i=0;i<2;i++)s.sparks.push({id:Math.random(),x:ox+(Math.random()-.5)*10,y:oy+(Math.random()-.5)*10,color:SPARK_COLORS[Math.floor(Math.random()*SPARK_COLORS.length)],life:1,vx:(Math.random()-.5)*1.5,vy:-(Math.random()+0.3),size:Math.random()*8+4});for(let i=0;i<3;i++){const sz=Math.floor(Math.random()*2+1)*4;s.mist.push({id:Math.random(),x:ox+(Math.random()-.5)*3,y:oy+(Math.random()-.5)*3,color:MIST_COLORS[Math.floor(Math.random()*MIST_COLORS.length)],life:1,vx:s.linkFacing===1?-(Math.random()*.5+.2):(Math.random()*.5+.2),vy:(Math.random()-.5)*.15,size:sz,wo:Math.random()*Math.PI*2,ws:Math.random()*.04+.02,wa:Math.random()*.6+.3,age:0});}}
      s.sparks=s.sparks.map(p=>({...p,life:p.life-.03,x:p.x+p.vx,y:p.y+p.vy})).filter(p=>p.life>0).slice(-50);
      s.mist=s.mist.map(p=>{const a=(p.age||0)+.016;return{...p,age:a,life:p.life-.004,x:p.x+p.vx,y:p.y+Math.sin(a*p.ws*60+p.wo)*p.wa};}).filter(p=>p.life>0).slice(-300);
      tick(n=>n+1);rafRef.current=requestAnimationFrame(loop);
    };
    rafRef.current=requestAnimationFrame(loop);return()=>cancelAnimationFrame(rafRef.current);
  },[]);
  const s=sRef.current,lScale=2.25,lW=20*lScale,lH=30*lScale,lt=s.linkTop||(s.height-lH-10);
  return h('div',{ref:containerRef,style:{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:50,overflow:"hidden"}},
    ...s.mist.map(p=>h('div',{key:p.id,style:{position:"absolute",left:Math.round(p.x),top:Math.round(p.y),width:p.size,height:p.size,background:p.color,opacity:p.life*.9,imageRendering:"pixelated",pointerEvents:"none"}})),
    ...s.sparks.map(p=>h('div',{key:p.id,style:{position:"absolute",left:p.x,top:p.y,width:p.size,height:p.size,borderRadius:"50%",background:p.color,opacity:p.life*.9,filter:`blur(${Math.round(p.size*.25)}px)`,transform:"translate(-50%,-50%)",pointerEvents:"none"}})),
    s.fairyX!==undefined&&h(Fragment,null,
      h('div',{style:{position:"absolute",left:s.fairyX,top:s.fairyY,width:22,height:22,borderRadius:"50%",background:"radial-gradient(circle,rgba(255,255,100,0.75),transparent 70%)",filter:"blur(5px)",transform:"translate(-50%,-50%)",pointerEvents:"none"}}),
      h('div',{style:{position:"absolute",left:s.fairyX,top:s.fairyY,width:10,height:10,borderRadius:"50%",background:"radial-gradient(circle,rgba(255,255,220,1),rgba(180,255,255,0.5) 60%,transparent)",filter:"blur(1px)",transform:"translate(-50%,-50%)",pointerEvents:"none"}}),
      h('div',{style:{position:"absolute",left:s.fairyX-7,top:s.fairyY-8,imageRendering:"pixelated",transform:"scale(0.95)",transformOrigin:"top left",filter:"drop-shadow(0 0 3px rgba(255,255,150,1)) drop-shadow(0 0 6px rgba(180,255,255,0.9))",pointerEvents:"none"},dangerouslySetInnerHTML:{__html:FAIRY_FRAMES[s.fairyFrame]}})
    ),
    h('div',{style:{position:"absolute",left:s.linkX,top:lt,width:lW,height:lH,imageRendering:"pixelated",transform:`scaleX(${s.linkFacing}) scale(${lScale})`,transformOrigin:"left top",filter:"drop-shadow(0 0 6px rgba(100,220,100,0.8))",pointerEvents:"none"},dangerouslySetInnerHTML:{__html:LINK_FRAMES[s.linkFrame]}})
  );
}

/* ─── DIAGONAL REVEAL (unchanged) ─── */
function DiagonalReveal({onComplete}){
  const [phase,setPhase]=useState(0);
  useEffect(()=>{const t1=setTimeout(()=>setPhase(1),100),t2=setTimeout(()=>{setPhase(2);onComplete();},1800);return()=>{clearTimeout(t1);clearTimeout(t2);};},[]);
  if(phase===2)return null;
  return h('div',{style:{position:"fixed",top:0,left:0,width:"100%",height:"100%",zIndex:100,pointerEvents:"none",overflow:"hidden"}},
    h('div',{style:{position:"absolute",top:0,left:0,width:"60%",height:"60%",background:"#04080f",clipPath:"polygon(0 0,100% 0,0 100%)",transform:phase===1?"translate(-120%,-120%)":"translate(0,0)",transition:phase===1?"transform 1.4s cubic-bezier(0.77,0,0.18,1)":"none"}}),
    h('div',{style:{position:"absolute",bottom:0,right:0,width:"60%",height:"60%",background:"#04080f",clipPath:"polygon(100% 100%,0 100%,100% 0)",transform:phase===1?"translate(120%,120%)":"translate(0,0)",transition:phase===1?"transform 1.4s cubic-bezier(0.77,0,0.18,1)":"none"}}),
    h('div',{style:{position:"absolute",top:0,left:0,width:"100%",height:"100%",background:"#04080f",clipPath:"polygon(40% 0,60% 0,100% 40%,100% 60%,60% 100%,40% 100%,0 60%,0 40%)",opacity:phase===1?0:1,transition:phase===1?"opacity 0.8s ease 0.3s":"none"}})
  );
}

function StatusBadge({status,label}){
  const colors={pending:"#4a6080",active:"#3a9bd5",done:"#1abc9c",error:"#e74c3c"};
  const icons={pending:"○",active:"◌",done:"✓",error:"✗"};
  return h('div',{style:{display:"flex",alignItems:"center",gap:8,padding:"6px 14px",borderRadius:6,background:status==="active"?"rgba(58,155,213,0.15)":"rgba(10,30,60,0.4)",border:`1px solid ${colors[status]}40`,marginBottom:6}},
    h('span',{style:{color:colors[status],fontSize:13}},icons[status]),
    h('span',{style:{color:colors[status],fontSize:12,letterSpacing:1}},label)

function LandmarkImage({name}){
  const [err,setErr]=useState(false);
  const seed=encodeURIComponent((name||"landmark").slice(0,30));
  return h('img',{src:err?`https://picsum.photos/400/250`:`https://picsum.photos/seed/${seed}/400/250`,alt:name,style:{width:"100%",maxWidth:360,borderRadius:10,objectFit:"cover",border:"1px solid rgba(58,155,213,0.3)"},onError:()=>setErr(true)});
}

/* ─── HALF-STAR RATING ─── */
function HalfStarRating({value,onChange}){
  // value: 0–5 in 0.5 steps. 5 stars, each split left/right half.
  const [hover,setHover]=useState(null);
  const display=hover!==null?hover:value;

  const handleMouse=(starIdx,e)=>{
    const rect=e.currentTarget.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const half=x<rect.width/2;
    setHover(half?starIdx-0.5:starIdx);
  };

  const handleClick=(starIdx,e)=>{
    const rect=e.currentTarget.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const half=x<rect.width/2;
    const val=half?starIdx-0.5:starIdx;
    onChange(val===value?0:val); // tap same value to clear
  };

  return h('div',{style:{display:"flex",alignItems:"center",gap:4}},
    [1,2,3,4,5].map(i=>{
      const filled=display>=i?'full':display>=i-0.5?'half':'empty';
      return h('div',{
        key:i,
        onMouseMove:(e)=>handleMouse(i,e),
        onMouseLeave:()=>setHover(null),
        onClick:(e)=>handleClick(i,e),

/* ─── SCENT LOGGER ─── */
function ScentLogger({name,notes,vibe,onSaved}){
  const [rating,setRating]=useState(0);
  const [activeChips,setActiveChips]=useState(new Set());
  const [freeNotes,setFreeNotes]=useState("");
  const [saved,setSaved]=useState(false);
  const [copied,setCopied]=useState(false);

  // Parse note strings into arrays
  const parseNotes=(str)=>str?str.split(',').map(s=>s.trim()).filter(Boolean):[];
  const topNotes=parseNotes(notes?.top);
  const midNotes=parseNotes(notes?.mid);
  const baseNotes=parseNotes(notes?.base);

  const toggleChip=(label)=>setActiveChips(prev=>{
    const n=new Set(prev);
    n.has(label)?n.delete(label):n.add(label);
    return n;
  });

  const buildNotesText=()=>{
    const chips=[...activeChips].join(", ");
    const parts=[];
    if(chips) parts.push(chips);
    if(freeNotes.trim()) parts.push(freeNotes.trim());
    return parts.join("\n\n");
  };

  const handleSave=()=>{
    const entry={
      id:Date.now(),
      name,
      rating,
      notes:buildNotesText(),
      chips:[...activeChips],
      vibe:activeChips.has('__vibe__')?vibe:'',
      date:new Date().toISOString()
    };
    const col=loadCollection();
    // Replace if same name exists
    const idx=col.findIndex(e=>e.name.toLowerCase()===name.toLowerCase());
    if(idx>=0)col[idx]=entry;else col.unshift(entry);
    saveCollection(col);
    setSaved(true);
    onSaved&&onSaved(entry);
    setTimeout(()=>setSaved(false),2500);
  };

  const handleShare=()=>{
    const stars="★".repeat(Math.floor(rating))+(rating%1?"½":"");
    const text=`✦ ${name}\n${stars} (${rating}/5)\n\n${buildNotesText()}`;
    if(navigator.share){navigator.share({text});}
    else{navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});}
  };

  return h('div',{style:{marginTop:28,padding:"24px 28px",background:"rgba(10,20,50,0.65)",border:"1px solid rgba(126,207,238,0.25)",borderRadius:14,animation:"fadeSlideUp 0.5s ease both"}},
    // Header
    h('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:20}},
      h('span',{style:{fontSize:20}},"📝"),
      h('h3',{style:{margin:0,color:"#7ecfee",fontSize:15,letterSpacing:2,textTransform:"uppercase",fontWeight:700}}),"Log This Scent"
    ),

    // Rating
    h('div',{style:{marginBottom:22}},
      h('p',{style:{color:"rgba(126,207,238,0.55)",fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:10}},"Your Rating"),
      h(HalfStarRating,{value:rating,onChange:setRating})
    ),

    // Top note chips
    topNotes.length>0&&h('div',{style:{marginBottom:14}},
      h('p',{style:{color:"#7ecfee",fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}),"✦ Top Notes",
      h('div',{style:{display:"flex",flexWrap:"wrap",gap:8}},
        topNotes.map(n=>h(NoteChip,{key:n,label:n,layer:"top",active:activeChips.has(n),onToggle:()=>toggleChip(n)}))
      )
    ),

    // Mid note chips
    midNotes.length>0&&h('div',{style:{marginBottom:14}},
      h('p',{style:{color:"#4a90d9",fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}),"❋ Mid Notes",
      h('div',{style:{display:"flex",flexWrap:"wrap",gap:8}},
        midNotes.map(n=>h(NoteChip,{key:n,label:n,layer:"mid",active:activeChips.has(n),onToggle:()=>toggleChip(n)}))
      )
    ),

    // Base / Dry Down chips
    baseNotes.length>0&&h('div',{style:{marginBottom:16}},
      h('p',{style:{color:"#6699cc",fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}),"◈ Dry Down",
      h('div',{style:{display:"flex",flexWrap:"wrap",gap:8}},
        baseNotes.map(n=>h(NoteChip,{key:n,label:n,layer:"base",active:activeChips.has(n),onToggle:()=>toggleChip(n)}))
      )
    ),

    // Vibe sentence
    vibe&&h('div',{style:{marginBottom:18}},
      h('p',{style:{color:"#c09af0",fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}),"✧ Vibe",
      h(NoteChip,{label:vibe,layer:"vibe",active:activeChips.has('__vibe__'),onToggle:()=>toggleChip('__vibe__')})
    ),

    // Free notes
    h('div',{style:{marginBottom:20}},
      h('p',{style:{color:"rgba(126,207,238,0.55)",fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:8}}),"Personal Notes",
      h('textarea',{
        value:freeNotes,
        onChange:e=>setFreeNotes(e.target.value),
        placeholder:"First impressions, dry-down thoughts, when you'd wear this...",
        rows:4,
        style:{
          width:"100%",padding:"14px 16px",
          background:"rgba(4,12,28,0.8)",color:"#c8dff5",
          border:"1px solid rgba(58,155,213,0.3)",borderRadius:10,
          fontSize:14,fontFamily:"Georgia,serif",lineHeight:1.7,
          letterSpacing:0.4
        }
      })
    ),

    // Action buttons
    h('div',{style:{display:"flex",gap:12,flexWrap:"wrap"}},
      h('button',{
        onClick:handleSave,
        style:{
          flex:1,minWidth:120,padding:"14px 20px",
          background:saved?"rgba(26,188,156,0.2)":"linear-gradient(135deg,#1e56a0,#3a9bd5)",
          color:saved?"#1abc9c":"#e8f4ff",
          border:`1px solid ${saved?"rgba(26,188,156,0.5)":"rgba(58,155,213,0.5)"}`,
          borderRadius:10,cursor:"pointer",
          fontSize:13,letterSpacing:2,fontFamily:"Georgia,serif",
          textTransform:"uppercase",transition:"all 0.3s ease",
          animation:saved?"savedPulse 0.5s ease":"none"
        }
      },saved?"✓ Saved!":"✦ Save to Collection"),
      h('button',{
        onClick:handleShare,
        style:{
          padding:"14px 20px",
          background:"rgba(126,207,238,0.08)",color:copied?"#1abc9c":"#7ecfee",
          border:"1px solid rgba(126,207,238,0.3)",borderRadius:10,
          cursor:"pointer",fontSize:13,letterSpacing:2,fontFamily:"Georgia,serif",
          textTransform:"uppercase",transition:"all 0.3s ease"
        }
      },copied?"✓ Copied!":"⬡ Share / Copy")
    )
  );
}

/* ─── API HELPERS ─── */
const callAPI=async(prompt)=>{
  const res=await fetch("/.netlify/functions/claude-proxy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2048,messages:[{role:"user",content:prompt}]})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`API error ${res.status}`);}
  const data=await res.json();
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
  const m=text.match(/\{[\s\S]*\}/);
  if(!m)throw new Error("No JSON in response");
  return JSON.parse(m[0]);
};

  const resultRef=useRef(null);
  const loggerRef=useRef(null);

  useEffect(()=>{setCollectionCount(loadCollection().length);},[]);

  const setStep=(label,status)=>setStepStatus(p=>({...p,[label]:status}));

  const analyze=async()=>{
    if(!fragrance.trim())return;
    setLoading(true);setError("");setSections({});setConfirmedName("");setStepStatus({});
    try{
      setStep("Identifying fragrance","active");
      let resolved={fragrance_full_name:fragrance.trim(),house:"",country:""};
      try{
        const res=await fetch("/.netlify/functions/claude-proxy",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:300,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:`Search for the fragrance: "${fragrance.trim()}". Return ONLY a JSON object with keys "fragrance_full_name","house","country". No markdown.`}]})});
        const data=await res.json();
        const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
        const m=text.match(/\{[\s\S]*?\}/);
        if(m)resolved={...resolved,...JSON.parse(m[0])};
        setStep("Identifying fragrance","done");

      setConfirmedName(resolved.fragrance_full_name||fragrance.trim());

      const n=resolved.fragrance_full_name,ho=resolved.house,co=resolved.country;

        callAPI(`You are a fragrance expert. For "${n}" by ${ho} from ${co}. Return ONLY valid JSON (no markdown): {"origin":"One sentence: when founded, where, and the creative vision.","notes":{"top":"comma-separated top notes","mid":"comma-separated mid notes","base":"comma-separated base notes"},"description":"Three paragraphs of rich evocative description. Use \\n\\n between paragraphs."}`),
        callAPI(`You are a creative writer. For "${n}" from ${co}. Return ONLY valid JSON (no markdown): {"marvel":"2-3 sentences: specific X-Men or Marvel character scene WITHOUT mentioning smell or scent.","videogame":"2-3 sentences: specific video game character scene WITHOUT mentioning smell or scent. Name the game.","popdiva":{"artist":"pop diva name","song":"exact real song title","description":"2-3 sentences associating the song mood with this fragrance. No smell references."}}`),

      ]);

      const full={...meta,...creative,...geo,...vibe};
      if(full.landmark?.wiki_title){const wt=encodeURIComponent(full.landmark.wiki_title.replace(/ /g,"_"));full.landmark.wiki_url=`https://en.wikipedia.org/wiki/${wt}`;}

      setTimeout(()=>loggerRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),400);

          h('div',{style:{animation:"float 4s ease-in-out infinite"}},
            h('p',{style:{color:"rgba(126,207,238,0.55)",fontSize:11,letterSpacing:6,textTransform:"uppercase",margin:"0 0 12px 0"}},"✦ FRAGRANCE ORACLE ✦"),
            h('h1',{style:{fontSize:"clamp(2.4rem,7vw,4.2rem)",fontWeight:400,margin:"0 0 8px 0",letterSpacing:3,background:"linear-gradient(135deg,#a8d8f0,#3a9bd5,#1e56a0)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"Sillage"),
            h('h1',{style:{fontSize:"clamp(1.4rem,4vw,2.2rem)",fontWeight:400,margin:"0 0 32px 0",letterSpacing:8,color:"rgba(126,207,238,0.65)"}},"SIDE QUEST")
          ),
          h('p',{style:{color:"rgba(126,207,238,0.45)",fontSize:13,letterSpacing:2,marginBottom:40,textTransform:"uppercase"}},"Enter a fragrance. Begin the journey."),
          h('div',{style:{display:"flex",width:"100%",maxWidth:520}},
            h('input',{value:fragrance,onChange:e=>{setFragrance(e.target.value);setError("");},onKeyDown:e=>e.key==="Enter"&&!loading&&analyze(),placeholder:"e.g. Bleu de Chanel, Black Orchid...",style:{flex:1,padding:"18px 24px",fontSize:15,background:"rgba(4,12,28,0.9)",color:"#e8f4ff",border:"1px solid rgba(58,155,213,0.35)",borderRight:"none",borderRadius:"10px 0 0 10px",letterSpacing:1,fontFamily:"Georgia,serif"}}),
            h('button',{onClick:analyze,disabled:loading||!fragrance.trim(),style:{padding:"18px 28px",fontSize:13,letterSpacing:2,background:loading?"rgba(58,155,213,0.2)":"linear-gradient(135deg,#1e56a0,#3a9bd5)",color:"#e8f4ff",border:"1px solid rgba(58,155,213,0.5)",borderRadius:"0 10px 10px 0",cursor:loading?"default":"pointer",textTransform:"uppercase",fontFamily:"Georgia,serif",transition:"all 0.3s ease",whiteSpace:"nowrap",animation:loading?"revealPulse 1.2s ease-in-out infinite":"none"}},
              loading?(stepStatus["Identifying fragrance"]==="done"?"✦ Analyzing...":"✦ Searching..."):"✦ Reveal")
          ),
          error&&h('p',{style:{color:"#e74c3c",marginTop:16,fontSize:13,maxWidth:520,textAlign:"center"}},`⚠ ${error}`),
          loading&&steps.length>0&&h('div',{style:{marginTop:24,maxWidth:300}},
            ...steps.map(([label,status])=>h(StatusBadge,{key:label,label,status}))
          )
        ),

        // Results
        h('div',{ref:resultRef},
          hasAny&&h('div',null,
            h('div',{style:{textAlign:"center",marginBottom:32,paddingTop:8,animation:"fadeSlideUp 0.4s ease both"}},
              h('p',{style:{color:"rgba(126,207,238,0.45)",fontSize:11,letterSpacing:4,textTransform:"uppercase",margin:"0 0 6px 0"}},"✦ confirmed fragrance ✦"),
              h('h2',{style:{fontSize:"clamp(1.2rem,3.5vw,1.8rem)",fontWeight:400,letterSpacing:3,background:"linear-gradient(135deg,#a8d8f0,#3a9bd5)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"0 0 10px 0"}},confirmedName,loading&&h('span',{style:{animation:"blink 1s infinite",marginLeft:4}},"|")),
              h('div',{style:{height:1,background:"linear-gradient(90deg,transparent,rgba(58,155,213,0.5),transparent)"}})
            ),

            sec.origin&&h(Section,{title:"Origin Story",icon:"📜"},txt(sec.origin)),
            sec.notes&&h(Section,{title:"Scent Notes",icon:"⚗️"},h(NotesChart,{notes:sec.notes})),
            sec.description&&h(Section,{title:"Fragrance Description",icon:"🌫️"},txt(sec.description,{whiteSpace:"pre-wrap"})),
            sec.marvel&&h(Section,{title:"Marvel / X-Men Vignette",icon:"⚡"},txt(sec.marvel)),
            sec.videogame&&h(Section,{title:"Video Game Vignette",icon:"🎮"},txt(sec.videogame)),
            sec.landmark&&h(Section,{title:"Tourist Landmark",icon:"🗺️"},
              txt(sec.landmark.description,{margin:"0 0 14px 0"}),
              h('div',{style:{display:"flex",gap:16,alignItems:"flex-start",flexWrap:"wrap"}},
                h(LandmarkImage,{name:sec.landmark.landmark_name}),
                h('div',null,
                  h('p',{style:{color:"#7ecfee",fontWeight:700,fontSize:16,margin:"0 0 4px 0"}},sec.landmark.landmark_name),
                  h('p',{style:{color:"#aac4e0",fontSize:13,margin:"0 0 10px 0"}},sec.landmark.country),
                  sec.landmark.wiki_url&&h('a',{href:sec.landmark.wiki_url,target:"_blank",rel:"noreferrer",style:{display:"inline-block",padding:"8px 16px",background:"rgba(58,155,213,0.15)",border:"1px solid rgba(58,155,213,0.4)",borderRadius:8,color:"#7ecfee",textDecoration:"none",fontSize:13,letterSpacing:1}},"Wikipedia ↗")
                )
              )
            ),
            sec.popdiva&&h(Section,{title:"Pop Diva Anthem",icon:"🎤"},
              h('div',{style:{display:"flex",alignItems:"center",gap:12,marginBottom:12,flexWrap:"wrap"}},
                h('div',{style:{padding:"6px 14px",background:"rgba(58,155,213,0.15)",border:"1px solid rgba(58,155,213,0.3)",borderRadius:20}},
                  h('span',{style:{color:"#7ecfee",fontSize:13,fontWeight:700}},sec.popdiva.artist),
                  h('span',{style:{color:"rgba(126,207,238,0.5)",fontSize:13,margin:"0 6px"}},"—"),
                  h('span',{style:{color:"#c8dff5",fontSize:13,fontStyle:"italic"}},`"${sec.popdiva.song}"`)
                )
              ),
              txt(sec.popdiva.description)
            ),

            // ── SCENT LOGGER ──
            h('div',{ref:loggerRef},
              h(ScentLogger,{
                name:confirmedName,
                notes:sec.notes,
                vibe:sec.vibe,
                onSaved:handleSaved
              })
            )
          )
        )
      ),

      // ── COLLECTION TAB ──
      tab==="collection"&&h('div',{style:{paddingTop:40,opacity:revealed?1:0,transition:"opacity 0.5s ease"}},
        h('div',{style:{textAlign:"center",marginBottom:32}},
          h('p',{style:{color:"rgba(126,207,238,0.45)",fontSize:11,letterSpacing:4,textTransform:"uppercase",margin:"0 0 6px 0"}},"✦ YOUR SILLAGE ✦"),
          h('h2',{style:{fontSize:"clamp(1.2rem,3.5vw,1.8rem)",fontWeight:400,letterSpacing:3,background:"linear-gradient(135deg,#a8d8f0,#3a9bd5)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",margin:"0 0 10px 0"}},"My Collection"),
          h('div',{style:{height:1,background:"linear-gradient(90deg,transparent,rgba(58,155,213,0.5),transparent)"}})
        ),
        h(CollectionView,null)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
