            error ? h("p", { style: { color: "#e74c3c", marginTop: 16, fontSize: 13, maxWidth: 520, textAlign: "center" } }, "\u26A0 " + error) : null,
            loading && steps.length > 0 ? h("div", { style: { marginTop: 24, maxWidth: 300 } }, steps.map(function(s) { return h(StatusBadge, { key: s[0], label: s[0], status: s[1] }); })) : null
          ),
          h("div", { ref: resultRef },
            hasAny ? h("div", null,
              h("div", { style: { textAlign: "center", marginBottom: 32, paddingTop: 8, animation: "fadeSlideUp 0.4s ease both" } },
                h("p", { style: { color: "rgba(126,207,238,0.45)", fontSize: 11, letterSpacing: 4, textTransform: "uppercase", margin: "0 0 6px 0" } }, "\u2726 confirmed fragrance \u2726"),
                h("h2", { style: { fontSize: "clamp(1.2rem,3.5vw,1.8rem)", fontWeight: 400, letterSpacing: 3, background: "linear-gradient(135deg,#a8d8f0,#3a9bd5)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", margin: "0 0 10px 0" } }, confirmedName || fragrance, loading ? h("span", { style: { animation: "blink 1s infinite", marginLeft: 4 } }, "|") : null),
                h("div", { style: { height: 1, background: "linear-gradient(90deg,transparent,rgba(58,155,213,0.5),transparent)" } })
              ),
              sec.origin ? h(Section, { title: "Origin Story", icon: "\uD83D\uDCDC" }, h("p", { style: { color: "#c8dff5", lineHeight: 1.8, margin: 0 } }, sec.origin)) : null,
              sec.notes ? h(Section, { title: "Scent Notes", icon: "\u2697\uFE0F" }, h(NotesChart, { notes: sec.notes })) : null,
              sec.description ? h(Section, { title: "Fragrance Description", icon: "\uD83C\uDF2B\uFE0F" }, h("p", { style: { color: "#c8dff5", lineHeight: 1.8, margin: 0, whiteSpace: "pre-wrap" } }, sec.description)) : null,
              sec.marvel ? h(Section, { title: "Marvel / X-Men Vignette", icon: "\u26A1" }, h("p", { style: { color: "#c8dff5", lineHeight: 1.8, margin: 0 } }, sec.marvel)) : null,
              sec.scifi ? h(Section, { title: "Sci-Fi Universe Vignette", icon: "\uD83D\uDE80" }, h("p", { style: { color: "#c8dff5", lineHeight: 1.8, margin: 0 } }, sec.scifi)) : null,
              sec.landmark ? h(Section, { title: "Tourist Landmark", icon: "\uD83D\uDDFA\uFE0F" },
                h("p", { style: { color: "#c8dff5", lineHeight: 1.8, margin: "0 0 14px 0" } }, sec.landmark.description),
                h("div", { style: { display: "flex", gap: 16, alignItems: "flex-start", flexWrap: "wrap" } },
                  h(LandmarkImage, { name: sec.landmark.landmark_name, country: sec.landmark.country }),
                  h("div", null,
                    h("p", { style: { color: "#7ecfee", fontWeight: 700, fontSize: 16, margin: "0 0 4px 0" } }, sec.landmark.landmark_name),
                    h("p", { style: { color: "#aac4e0", fontSize: 13, margin: "0 0 10px 0" } }, sec.landmark.country),
                    sec.landmark.wiki_url ? h("a", { href: sec.landmark.wiki_url, target: "_blank", rel: "noreferrer", style: { display: "inline-block", padding: "8px 16px", background: "rgba(58,155,213,0.15)", border: "1px solid rgba(58,155,213,0.4)", borderRadius: 8, color: "#7ecfee", textDecoration: "none", fontSize: 13, letterSpacing: 1 } }, "Wikipedia \u2197") : null
                  )
                )
              ) : null,
              sec.traveler ? h(Section, { title: "The Traveler's Read", icon: "\uD83E\uDDF3" }, h("p", { style: { color: "#c8dff5", lineHeight: 1.8, margin: 0 } }, sec.traveler)) : null
            ) : null
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
  </script>
